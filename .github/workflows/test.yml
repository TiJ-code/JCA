on: Tests

on:
  pull_request:

  push:
    branches:
      - main


jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: temurin
          cache: maven

      - name: Run tests
        run: mvn -B test
